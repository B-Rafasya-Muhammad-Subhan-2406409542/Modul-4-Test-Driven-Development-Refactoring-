<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Review Payment</title>
</head>
<body>
    <h2>Review Payment</h2>
    <p>Payment ID: <span th:text="${payment.id}"></span></p>
    <p>Current Status: <span th:text="${payment.status}"></span></p>

    <form th:action="@{/payment/admin/set-status/{id}(id=${payment.id})}" method="post">
        <select name="status">
            <option value="SUCCESS">Accept (SUCCESS)</option>
            <option value="REJECTED">Reject (REJECTED)</option>
        </select>
        <button type="submit">Update Status</button>
    </form>
</body>
</html>
